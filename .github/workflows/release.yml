name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { execSync } = require('child_process');

            const tag = context.ref.replace('refs/tags/', '');
            const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');

            // Extract content for this version from changelog
            const versionMatch = changelog.match(new RegExp(`## \\[${tag}\\][\\s\\S]*?(?=## \\[|$)`));
            const releaseNotes = versionMatch ? versionMatch[0] : `Release ${tag}`;

            await github.rest.releases.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `v${tag}`,
              body: releaseNotes,
              draft: false,
              prerelease: tag.includes('-')
            });
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy to Production
        if: ${{ github.ref == 'refs/heads/main' }}
        run: |
          echo "Production deployment triggered for tag ${{ github.ref }}"
